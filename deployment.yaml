apiVersion: apps/v1
kind: Deployment

metadata:
  name: springboot-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: springboot-app

  template:
    metadata:
      labels:
        app: springboot-app

    spec:
      containers:

      - name: springboot-app

        image: YOUR_DOCKERHUB_USERNAME/springboot-jdk21-app:latest

        ports:
        - containerPort: 8080
